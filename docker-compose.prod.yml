services:
  db_primary:
    image: timescale/timescaledb:latest-pg15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: proofnode
    volumes:
      - pgdata_primary:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  rabbitmq:
    image: rabbitmq:3.12-management
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7.2-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run uvicorn backend.app.main:app --host 0.0.0.0 --port 8000
    restart: always
    environment:
      - ENV=production
      - POSTGRES_HOST=db_primary
      - RABBITMQ_HOST=rabbitmq
      - REDIS_HOST=redis
      - PROMETHEUS_ENABLED=true
    depends_on:
      db_primary:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run python -m backend.app.worker
    restart: always
    environment:
      - ENV=production
      - POSTGRES_HOST=db_primary
      - RABBITMQ_HOST=rabbitmq
      - REDIS_HOST=redis
      - PROMETHEUS_ENABLED=true
    depends_on:
      db_primary:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  copy_worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run python -m backend.app.copy_worker
    restart: always
    environment:
      - ENV=production
      - POSTGRES_HOST=db_primary
      - RABBITMQ_HOST=rabbitmq
      - REDIS_HOST=redis
      - PROMETHEUS_ENABLED=true
    depends_on:
      db_primary:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run python -m bot.main
    restart: always
    environment:
      - ENV=production
      - POSTGRES_HOST=db_primary
      - RABBITMQ_HOST=rabbitmq
      - REDIS_HOST=redis
      - PROMETHEUS_ENABLED=true
    depends_on:
      db_primary:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    restart: always
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:latest
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    command: caddy reverse-proxy --from proofnode.com --to gateway:8000
    depends_on:
      - gateway

volumes:
  pgdata_primary:
  rabbitmq_data:
  redis_data:
  prometheus_data:
  grafana_data:
